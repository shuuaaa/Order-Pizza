<!DOCTYPE html>
<html>
	<head>
	<title>Pizza Order</title>
		<style>


		</style>
	</head>
<body>

<h3>Personal Details</h3>

	<form>
	<label for="Fullname">Name:</label> <input type="text" id="name" name="Fullname" placeholder="enter your name" required> <br> <br>
	<label for="Email">Email:</label> <input type="text" id="email" name=" Email" placeholder="enter your email" required> <br> <br>
	<label for="Phone Number">Phone number:</label> <input type="text" id="Tel" name="Phone Number" placeholder="e.g 09123456789" required> <br> <br>
	<label for="Age">Age:</label> <input type="text" id="age" name="age" placeholder="" required> <br> <br>	

<h3>Pizza Size</h3>
		
	<br><input type="radio" name="Small" value="yes">Small
	<br><input type="radio" name="Medium" value="no">Medium
	<br><input type="radio" name="Large" value="yes">Large
	<br><input type="radio" name="Extra Large" value="yes">Extra large

<h3>Crust Type</h3>

	<label for="Crust"></label>
	<select id="crust" name="crusts">
		<option value="">Choose your crust</option>
		<option value="thin">Thin</option>
		<option value="thick">Thick</option>
		<option value="Stuffed">Stuffed</option>
		<option value="Glutten-Free">Glutten-Free</option>



<h3>Sauce</h3>

	<label for="Sauce"></label>
	<select id="sauce" name="sauces">
		<option value="">Choose your crust</option>
		<option value="Tomato">Tomato</option>
		<option value="Garlic White">Garlic White</option>
		<option value="Pesto">Pesto</option>
		<option value="Barbeque">Barbequee</option>


<h3>Toppings</h3>

	<br><input type="checkbox" name="Cheese" value="yes">Cheese
	<br><input type="checkbox" name="Pepperoni" value="yes">Pepperoni
	<br><input type="checkbox" name="Mushrooms" value="yes">Mushrooms
	<br><input type="checkbox" name="Onions" value="yes">Onions
	<br><input type="checkbox" name="Bell Pepper" value="yes">Bell Pepper
	<br><input type="checkbox" name="Olives" value="yes">Olives
	<br><input type="checkbox" name="Bacon" value="yes">Bacon
	<br><input type="checkbox" name="Pineapple" value="yes">Pineapple

<h3>Delivery Method</h3>

	<br><input type="radio" name="Home Delivery" value="yes">Home Delivery
	<br><input type="radio" name="Store Pickup" value="no">Store Pickup




<h3>Price Reference</h3>
	</form>	
</body>
</html>
